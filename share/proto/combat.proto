syntax = "proto3";

package pb;

option go_package = "server/pkg/pb";
option csharp_namespace = "GameClient.Network.Pb";

import "common.proto";

service CombatService {
  rpc ValidatePvEResult(ValidatePvEResultRequest) returns (ValidatePvEResultResponse);
}

message ValidatePvEResultRequest {
  string enemy_id = 1;
  bool is_victory = 2;
  int32 player_power = 3;
  int32 enemy_power = 4;
  repeated CombatActionLog combat_logs = 5;
}

message CombatActionLog {
  string caster_id = 1;
  string target_id = 2;
  string skill_id = 3;
  int32 damage = 4;
  int32 heal = 5;
  bool is_crit = 6;
}

message ValidatePvEResultResponse {
  BaseResponse base = 1;
  bool is_valid = 2;
  int32 reward_exp = 3;
  int32 reward_linh_thach = 4;
}
