server {
    listen 80;
    server_name localhost;

    # Giao diện chính (Landing Page & Dashboard)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy tới CDN Server (Admin service)
    location /cdn {
        proxy_pass http://admin:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy tới Cutscene APIs (Gateway service)
    location /api/v1/cutscenes {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Fix: Buffer response để gửi Content-Length thay vì chunked encoding
        # Unity UnityWebRequest không xử lý được chunked encoding qua proxy
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        chunked_transfer_encoding off;
    }

    # Proxy tới Web APIs (Admin service)
    location /api {
        proxy_pass http://admin:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Fix: Buffer response để gửi Content-Length thay vì chunked encoding
        # Unity UnityWebRequest không xử lý được chunked encoding qua proxy
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        chunked_transfer_encoding off;
        # Thêm CORS headers cho Unity Editor
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Proxy tới Health Check của Admin
    location /health {
        proxy_pass http://admin:8080;
    }

    # Cấu hình lỗi
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
