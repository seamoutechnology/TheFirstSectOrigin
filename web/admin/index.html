<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The First Sect Origin - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --sidebar-bg: #ffffff;
            --sidebar-active-bg: rgba(99, 102, 241, 0.1);
            --sidebar-active-color: #6366f1;
            --sidebar-text: #6b7280;
            --card-bg: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --border-color: #e5e7eb;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #f59e0b;
            --success: #10b981;
            --info: #06b6d4;
            --danger: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            
            --rarity-ur: #ef4444;
            --rarity-ssr: #f59e0b;
            --rarity-sr: #6366f1;
            --rarity-r: #06b6d4;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        .sidebar {
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            position: fixed;
            padding: 30px 16px;
        }

        .sidebar-brand {
            font-weight: 800;
            font-size: 1.35rem;
            color: var(--primary);
            letter-spacing: 0.05em;
            margin-bottom: 40px;
            padding-left: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-brand::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--accent);
        }

        .nav-link {
            color: var(--sidebar-text);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: #f3f4f6;
        }

        .nav-link.active {
            color: var(--sidebar-active-color);
            background: var(--sidebar-active-bg);
        }

        .main-content {
            margin-left: 16.666667%;
            padding: 40px;
            min-height: 100vh;
        }

        h2 {
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .card-header {
            background-color: #f9fafb;
            border-bottom: 1px solid var(--border-color);
            padding: 18px 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .card-body {
            padding: 24px;
        }

        .table {
            color: var(--text-primary);
            vertical-align: middle;
            margin-bottom: 0;
        }

        .table th {
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            font-size: 0.9rem;
        }

        .table td {
            border-bottom: 1px solid var(--border-color);
            padding: 16px;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .type-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
        }

        .badge-MAINTENANCE { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .badge-RULES { background: rgba(107, 114, 128, 0.1); color: var(--sidebar-text); }
        .badge-ACTIVITY { background: rgba(6, 182, 212, 0.1); color: var(--info); }
        .badge-NEWS { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            color: #ffffff;
            font-weight: 600;
            border-radius: 12px;
            padding: 10px 20px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            color: #ffffff;
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.35);
        }

        .form-control, .form-select {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 10px 14px;
        }

        .form-control:focus, .form-select:focus {
            background-color: #ffffff;
            border-color: var(--primary);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 15px;
            box-shadow: var(--shadow-md);
        }

        .modal-header, .modal-footer {
            border-color: var(--border-color);
        }

        /* Disciples UI styling */
        .rarity-UR { color: var(--rarity-ur); font-weight: 800; }
        .rarity-SSR { color: var(--rarity-ssr); font-weight: 800; }
        .rarity-SR { color: var(--rarity-sr); font-weight: 800; }
        .rarity-R { color: var(--rarity-r); font-weight: 800; }

        .disciple-card {
            background: #f9fafb;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .disciple-card:hover {
            background: #ffffff;
            border-color: rgba(99, 102, 241, 0.2);
            box-shadow: var(--shadow);
        }

        .stars-container {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <div class="sidebar-brand">TSO ADMIN</div>
                <nav class="nav flex-column">
                    <a class="nav-link active" href="#" id="link-notices" onclick="switchTab('notices')">
                        <i class="fas fa-bullhorn"></i> Quản lý Thông báo
                    </a>
                    <a class="nav-link" href="#" id="link-players" onclick="switchTab('players')">
                        <i class="fas fa-users"></i> Quản lý Người chơi
                    </a>
                </nav>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 main-content">
                <!-- Announcements Tab -->
                <div id="tab-notices" class="tab-pane">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2>Thông báo hệ thống</h2>
                        <button class="btn btn-primary" onclick="openAddNoticeModal()">+ Thêm Thông báo</button>
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Loại</th>
                                        <th>Tiêu đề</th>
                                        <th>Nội dung</th>
                                        <th>Ngày tạo</th>
                                        <th>Hành động</th>
                                    </tr>
                                </thead>
                                <tbody id="notices-list">
                                    <!-- Dynamic content -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Players Tab -->
                <div id="tab-players" class="tab-pane" style="display: none;">
                    <h2 class="mb-4">Quản lý người chơi</h2>
                    <div class="card mb-4">
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <input type="text" id="search-player-input" class="form-control" placeholder="Nhập tên đăng nhập hoặc Nickname...">
                                </div>
                                <div class="col-md-2">
                                    <button class="btn btn-primary w-100" onclick="searchPlayers()">Tìm kiếm</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-body">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>User ID</th>
                                        <th>Tên Đăng Nhập</th>
                                        <th>Nickname</th>
                                        <th>Cấp độ</th>
                                        <th>Vàng (Bạc)</th>
                                        <th>Kim Cương</th>
                                        <th>Hành động</th>
                                    </tr>
                                </thead>
                                <tbody id="players-list">
                                    <!-- Dynamic content -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notice Modal -->
    <div class="modal fade" id="noticeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="noticeModalTitle">Thêm Thông báo mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="notice-id">
                    <div class="mb-3">
                        <label class="form-label">Loại thông báo</label>
                        <select id="notice-type" class="form-select">
                            <option value="NEWS">Tin tức (NEWS)</option>
                            <option value="ACTIVITY">Hoạt động (ACTIVITY)</option>
                            <option value="MAINTENANCE">Bảo trì (MAINTENANCE)</option>
                            <option value="RULES">Điều khoản (RULES)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tiêu đề</label>
                        <input type="text" id="notice-title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nội dung</label>
                        <textarea id="notice-content" class="form-control" rows="4" required></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" style="border-radius:12px; padding:10px 20px;" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="saveNotice()">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Player Details Modal -->
    <div class="modal fade" id="playerModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Chi tiết Chưởng Môn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <!-- Left Info -->
                        <div class="col-md-6">
                            <h6 class="border-bottom pb-2 mb-3">Thông tin cơ bản</h6>
                            <input type="hidden" id="edit-player-id">
                            <div class="mb-3">
                                <label class="form-label">Tên Đăng Nhập</label>
                                <input type="text" id="p-username" class="form-control" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nickname trong game</label>
                                <input type="text" id="p-nickname" class="form-control" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Cấp độ</label>
                                    <input type="number" id="p-level" class="form-control" required>
                                </div>
                                <div class="col">
                                    <label class="form-label">EXP tích lũy</label>
                                    <input type="number" id="p-exp" class="form-control" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Bạc (Vàng)</label>
                                    <input type="number" id="p-gold" class="form-control" required>
                                </div>
                                <div class="col">
                                    <label class="form-label">Kim Cương</label>
                                    <input type="number" id="p-diamond" class="form-control" required>
                                </div>
                            </div>
                        </div>

                        <!-- Right Disciples List -->
                        <div class="col-md-6">
                            <h6 class="border-bottom pb-2 mb-3">Đệ tử sở hữu</h6>
                            <div id="player-disciples-container" style="max-height: 350px; overflow-y: auto; padding-right: 5px;">
                                <!-- Dynamic disciple cards -->
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" style="border-radius:12px; padding:10px 20px;" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="savePlayerChanges()">Cập nhật thông tin</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let noticeModalObj;
        let playerModalObj;

        document.addEventListener('DOMContentLoaded', () => {
            noticeModalObj = new bootstrap.Modal(document.getElementById('noticeModal'));
            playerModalObj = new bootstrap.Modal(document.getElementById('playerModal'));
            loadNotices();
        });

        function switchTab(tabName) {
            document.querySelectorAll('.tab-pane').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));

            if (tabName === 'notices') {
                document.getElementById('tab-notices').style.display = 'block';
                document.getElementById('link-notices').classList.add('active');
                loadNotices();
            } else if (tabName === 'players') {
                document.getElementById('tab-players').style.display = 'block';
                document.getElementById('link-players').classList.add('active');
                loadPlayers();
            }
        }

        // --- Announcements Logic ---
        async function loadNotices() {
            try {
                const res = await fetch('/api/admin/notices');
                const data = await res.json();
                const container = document.getElementById('notices-list');
                container.innerHTML = '';
                
                if (data.code === 0 && data.notices) {
                    data.notices.forEach(notice => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${notice.id}</td>
                            <td><span class="type-badge badge-${notice.type}">${notice.type}</span></td>
                            <td><strong>${notice.title}</strong></td>
                            <td style="max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${notice.content}</td>
                            <td>${new Date(notice.created_at * 1000).toLocaleString()}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary me-2" onclick="editNotice(${notice.id}, '${notice.type}', \`${notice.title}\`, \`${notice.content}\`)">Sửa</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteNotice(${notice.id})">Xóa</button>
                            </td>
                        `;
                        container.appendChild(tr);
                    });
                }
            } catch (err) {
                console.error("Lỗi tải thông báo:", err);
            }
        }

        function openAddNoticeModal() {
            document.getElementById('noticeModalTitle').innerText = 'Thêm Thông báo mới';
            document.getElementById('notice-id').value = '';
            document.getElementById('notice-type').value = 'NEWS';
            document.getElementById('notice-title').value = '';
            document.getElementById('notice-content').value = '';
            noticeModalObj.show();
        }

        function editNotice(id, type, title, content) {
            document.getElementById('noticeModalTitle').innerText = 'Chỉnh sửa Thông báo';
            document.getElementById('notice-id').value = id;
            document.getElementById('notice-type').value = type;
            document.getElementById('notice-title').value = title;
            document.getElementById('notice-content').value = content;
            noticeModalObj.show();
        }

        async function saveNotice() {
            const id = document.getElementById('notice-id').value;
            const type = document.getElementById('notice-type').value;
            const title = document.getElementById('notice-title').value.trim();
            const content = document.getElementById('notice-content').value.trim();

            if (!title || !content) {
                alert('Vui lòng điền đầy đủ tiêu đề và nội dung');
                return;
            }

            const body = { type, title, content };
            let url = '/api/admin/notices';
            let method = 'POST';

            if (id) {
                body.id = parseInt(id);
                method = 'PUT';
            }

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const result = await res.json();
                if (result.code === 0) {
                    noticeModalObj.hide();
                    loadNotices();
                } else {
                    alert(result.message || 'Lỗi lưu thông báo');
                }
            } catch (err) {
                console.error(err);
                alert('Không thể kết nối đến API');
            }
        }

        async function deleteNotice(id) {
            if (!confirm('Bạn có chắc chắn muốn xóa thông báo này?')) return;
            try {
                const res = await fetch(`/api/admin/notices?id=${id}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.code === 0) {
                    loadNotices();
                } else {
                    alert(result.message || 'Xóa thất bại');
                }
            } catch (err) {
                console.error(err);
            }
        }

        // --- Players Logic ---
        async function loadPlayers() {
            try {
                const res = await fetch('/api/admin/players');
                const data = await res.json();
                renderPlayers(data.players || []);
            } catch (err) {
                console.error("Lỗi tải người chơi:", err);
            }
        }

        function renderPlayers(players) {
            const container = document.getElementById('players-list');
            container.innerHTML = '';
            players.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${p.user_id}</td>
                    <td>${p.username}</td>
                    <td><strong class="text-primary">${p.nickname || 'Chưa Tạo'}</strong></td>
                    <td>Lv ${p.level}</td>
                    <td>${p.gold.toLocaleString()} Bạc</td>
                    <td>${p.diamond.toLocaleString()} KC</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="viewPlayerDetails(${p.user_id})">Quản lý</button>
                    </td>
                `;
                container.appendChild(tr);
            });
        }

        async function searchPlayers() {
            const query = document.getElementById('search-player-input').value.trim();
            if (!query) {
                loadPlayers();
                return;
            }
            try {
                const res = await fetch(`/api/admin/players/search?query=${encodeURIComponent(query)}`);
                const data = await res.json();
                renderPlayers(data.players || []);
            } catch (err) {
                console.error("Tìm kiếm thất bại:", err);
            }
        }

        async function viewPlayerDetails(userId) {
            try {
                const res = await fetch(`/api/admin/player/detail?user_id=${userId}`);
                const data = await res.json();
                if (data.code === 0 && data.player) {
                    const p = data.player;
                    document.getElementById('edit-player-id').value = p.user_id;
                    document.getElementById('p-username').value = p.username;
                    document.getElementById('p-nickname').value = p.nickname;
                    document.getElementById('p-level').value = p.level;
                    document.getElementById('p-exp').value = p.exp;
                    document.getElementById('p-gold').value = p.gold;
                    document.getElementById('p-diamond').value = p.diamond;

                    // render disciples list
                    const container = document.getElementById('player-disciples-container');
                    container.innerHTML = '';
                    if (data.disciples && data.disciples.length > 0) {
                        data.disciples.forEach(d => {
                            const div = document.createElement('div');
                            div.className = 'disciple-card';
                            div.innerHTML = `
                                <div>
                                    <div class="fw-bold">${d.name} <span class="rarity-${d.rarity}">${d.rarity}</span></div>
                                    <div class="stars-container">${'★'.repeat(d.star)}</div>
                                </div>
                                <div class="text-end">
                                    <div class="small text-muted">Lv ${d.level}</div>
                                    <div class="small text-muted">Lực Chiến: ${d.atk * 2 + d.hp / 5}</div>
                                </div>
                            `;
                            container.appendChild(div);
                        });
                    } else {
                        container.innerHTML = '<div class="text-muted text-center py-4">Không sở hữu đệ tử nào.</div>';
                    }
                    playerModalObj.show();
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function savePlayerChanges() {
            const userId = parseInt(document.getElementById('edit-player-id').value);
            const nickname = document.getElementById('p-nickname').value.trim();
            const level = parseInt(document.getElementById('p-level').value);
            const exp = parseInt(document.getElementById('p-exp').value);
            const gold = parseInt(document.getElementById('p-gold').value);
            const diamond = parseInt(document.getElementById('p-diamond').value);

            if (!nickname) {
                alert('Tên nickname không được để trống');
                return;
            }

            try {
                const res = await fetch('/api/admin/player/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, nickname, level, exp, gold, diamond })
                });
                const result = await res.json();
                if (result.code === 0) {
                    playerModalObj.hide();
                    loadPlayers();
                } else {
                    alert(result.message || 'Cập nhật thất bại');
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
