services:
  # ============================================================
  # GLOBAL DATABASE
  # ============================================================
  postgres_global:
    image: postgres:15-alpine
    container_name: ${COMPOSE_PROJECT_NAME}_postgres_global
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_global_data:/var/lib/postgresql/data
      - ./server/db/migrations/global:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # GAME DATABASE
  # ============================================================
  postgres_game:
    image: postgres:15-alpine
    container_name: ${COMPOSE_PROJECT_NAME}_postgres_game
    environment:
      POSTGRES_USER: ${GAME_DB_USER}
      POSTGRES_PASSWORD: ${GAME_DB_PASSWORD}
      POSTGRES_DB: ${GAME_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_game_data:/var/lib/postgresql/data
      - ./server/db/migrations/game:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GAME_DB_USER} -d ${GAME_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # REDIS - Cache, Session, Pub/Sub, Leaderboard
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME}_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-""}
      --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # GLOBAL LOGIN SERVER 
  # ============================================================
  login_server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: ${APP_ENV}
    container_name: ${COMPOSE_PROJECT_NAME}_login_server
    command: ["./bin/login-server"]
    environment:
      APP_ENV: ${APP_ENV}
      POSTGRES_HOST: postgres_global
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS}
      SERVER_PORT: ${LOGIN_SERVER_PORT}
      ADMIN_SECRET: ${ADMIN_SECRET}
    ports:
      - "${LOGIN_SERVER_PORT}:${LOGIN_SERVER_PORT}"
      - "8082:8082"
    depends_on:
      postgres_global:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    profiles:
      - server

  # ============================================================
  # GATEWAY SERVER (Zone 1)
  # ============================================================
  gateway:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: ${APP_ENV}
    container_name: ${COMPOSE_PROJECT_NAME}_gateway
    command: ["./bin/gateway"]
    environment:
      APP_ENV: ${APP_ENV}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: ${GATEWAY_PORT}
      WORLD_SERVER_HOST: world_server
      WORLD_SERVER_PORT: ${WORLD_SERVER_PORT}
      COMBAT_SERVER_HOST: combat_server
      COMBAT_SERVER_PORT: ${COMBAT_SERVER_PORT}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-50}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
      - "8081:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - server

  # ============================================================
  # WORLD SERVER (Zone 1)
  # ============================================================
  world_server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: ${APP_ENV}
    container_name: ${COMPOSE_PROJECT_NAME}_world_server
    command: ["./bin/world-server"]
    environment:
      APP_ENV: ${APP_ENV}
      GAME_DB_HOST: postgres_game
      GAME_DB_PORT: ${GAME_DB_PORT}
      GAME_DB_USER: ${GAME_DB_USER}
      GAME_DB_PASSWORD: ${GAME_DB_PASSWORD}
      GAME_DB_NAME: ${GAME_DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SERVER_ID: zone1
      SERVER_PORT: ${WORLD_SERVER_PORT}
      COMBAT_SERVER_HOST: combat_server
      COMBAT_SERVER_PORT: ${COMBAT_SERVER_PORT}
    ports:
      - "${WORLD_SERVER_PORT}:${WORLD_SERVER_PORT}"
    depends_on:
      postgres_game:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - server

  # ============================================================
  # COMBAT SERVER (Zone 1)
  # ============================================================
  combat_server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: ${APP_ENV}
    container_name: ${COMPOSE_PROJECT_NAME}_combat_server
    command: ["./bin/combat-server"]
    environment:
      APP_ENV: ${APP_ENV}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      COMBAT_SERVER_PORT: ${COMBAT_SERVER_PORT}
    ports:
      - "${COMBAT_SERVER_PORT}:${COMBAT_SERVER_PORT}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - server

  # ============================================================
  # ADMIN DASHBOARD
  # ============================================================
  admin:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: ${APP_ENV}
    container_name: ${COMPOSE_PROJECT_NAME}_admin
    command: ["./bin/admin"]
    environment:
      APP_ENV: ${APP_ENV}
      POSTGRES_HOST: postgres_global
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GAME_DB_HOST: postgres_game
      GAME_DB_PORT: ${GAME_DB_PORT}
      GAME_DB_USER: ${GAME_DB_USER}
      GAME_DB_PASSWORD: ${GAME_DB_PASSWORD}
      GAME_DB_NAME: ${GAME_DB_NAME}
      ADMIN_PORT: ${ADMIN_PORT}
      ADMIN_SECRET: ${ADMIN_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS}
    ports:
      - "${ADMIN_PORT}:${ADMIN_PORT}"
    depends_on:
      postgres_global:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - server

  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME}_nginx
    ports:
      - "80:80"
    volumes:
      - ./web:/usr/share/nginx/html
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin
    restart: unless-stopped
    profiles:
      - server


  # ============================================================
  # OBSERVABILITY (Prometheus & Grafana)
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ${COMPOSE_PROJECT_NAME}_prometheus
    volumes:
      - ./server/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    profiles:
      - monitor

  grafana:
    image: grafana/grafana:latest
    container_name: ${COMPOSE_PROJECT_NAME}_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitor

# ============================================================
# VOLUMES
# ============================================================
volumes:
  postgres_global_data:
  postgres_game_data:
  redis_data:
  prometheus_data:
  grafana_data:


