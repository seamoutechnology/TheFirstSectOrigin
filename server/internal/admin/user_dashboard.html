<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The First Sect Origin - Cổng Tu Luyện</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: rgba(31, 40, 51, 0.65);
            --accent-color: #66fcf1;
            --accent-hover: #45f3e7;
            --text-color: #c5c6c7;
            --heading-color: #ffffff;
            --gold-color: #f39c12;
            --qi-color: #9b59b6;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 500px;
            background: var(--container-bg);
            border: 1px solid rgba(102, 252, 241, 0.25);
            backdrop-filter: blur(12px);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .dashboard-container:hover {
            transform: translateY(-2px);
            border-color: rgba(102, 252, 241, 0.5);
        }

        h1 {
            color: var(--heading-color);
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
        }

        .profile-card {
            background: rgba(11, 12, 16, 0.8);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .profile-row:last-child {
            margin-bottom: 0;
        }

        .label {
            color: #858688;
        }

        .value {
            font-weight: 600;
            color: var(--heading-color);
        }

        .value.accent {
            color: var(--accent-color);
        }

        .value.gold {
            color: var(--gold-color);
        }

        .value.qi {
            color: var(--qi-color);
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #858688;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .tab-btn.active {
            color: var(--accent-color);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #858688;
        }

        .input-field {
            width: 100%;
            padding: 14px;
            background: rgba(11, 12, 16, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--heading-color);
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: #0b0c10;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
        }

        .btn-submit:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background: #4a5568;
            color: #a0aec0;
            cursor: not-allowed;
            box-shadow: none;
        }

        .recharge-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .recharge-card {
            background: rgba(11, 12, 16, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .recharge-card:hover {
            border-color: rgba(102, 252, 241, 0.3);
            background: rgba(11, 12, 16, 0.9);
        }

        .recharge-card.selected {
            border-color: var(--accent-color);
            background: rgba(102, 252, 241, 0.05);
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.1);
        }

        .recharge-amount {
            font-size: 16px;
            font-weight: 700;
            color: var(--heading-color);
            margin-bottom: 5px;
        }

        .recharge-reward {
            font-size: 12px;
            color: var(--accent-color);
        }

        #result-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            text-align: center;
        }

        .result-success {
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .result-error {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>CỔNG TU LUYỆN</h1>
        <div class="profile-card">
            <div class="profile-row">
                <span class="label">Máy Chủ (Zone):</span>
                <span class="value">
                    <select id="zone-select" class="input-field" style="padding: 4px 8px; width: auto; font-size: 13px; border-radius: 4px; background: rgba(11, 12, 16, 0.9); color: var(--accent-color); border: 1px solid var(--accent-color); cursor: pointer;" onchange="changeZone(this.value)">
                        {{range .Zones}}
                        <option value="{{.ID}}" {{if eq $.ZoneID .ID}}selected{{end}}>{{.Name}}</option>
                        {{end}}
                    </select>
                </span>
            </div>
            <div class="profile-row">
                <span class="label">Tên Nhân Vật:</span>
                <span id="player-nickname" class="value accent">{{.Nickname}}</span>
            </div>
            <div class="profile-row">
                <span class="label">Cấp Độ:</span>
                <span id="player-level" class="value">{{.Level}}</span>
            </div>
            <div class="profile-row">
                <span class="label">Vàng Tích Lũy:</span>
                <span id="player-gold" class="value gold">{{.Gold}} Vàng</span>
            </div>
            <div class="profile-row">
                <span class="label">Xu Tích Lũy:</span>
                <span id="player-diamond" class="value qi">{{.Diamond}} Xu</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('redeem')">Đổi GiftCode</button>
            <button class="tab-btn" onclick="switchTab('recharge')">Nạp Xu & Vàng</button>
        </div>

        <!-- Redeem Tab -->
        <div id="tab-redeem" class="tab-content active">
            <div class="form-group">
                <label for="giftcode-input">Nhập mã GiftCode:</label>
                <input type="text" id="giftcode-input" class="input-field" placeholder="Ví dụ: SECT666" style="text-transform: uppercase;">
            </div>
            <button id="btn-redeem" class="btn-submit" onclick="submitRedeem()">XÁC NHẬN ĐỔI MÃ</button>
        </div>

        <!-- Recharge Tab -->
        <div id="tab-recharge" class="tab-content">
            <label>Chọn mốc nạp:</label>
            <div class="recharge-grid">
                <div class="recharge-card" onclick="selectRecharge(this, 10000)">
                    <div class="recharge-amount">10.000đ</div>
                    <div class="recharge-reward">+10 Xu / +100k Vàng</div>
                </div>
                <div class="recharge-card" onclick="selectRecharge(this, 50000)">
                    <div class="recharge-amount">50.000đ</div>
                    <div class="recharge-reward">+50 Xu / +500k Vàng</div>
                </div>
                <div class="recharge-card" onclick="selectRecharge(this, 100000)">
                    <div class="recharge-amount">100.000đ</div>
                    <div class="recharge-reward">+100 Xu / +1M Vàng</div>
                </div>
                <div class="recharge-card" onclick="selectRecharge(this, 200000)">
                    <div class="recharge-amount">200.000đ</div>
                    <div class="recharge-reward">+200 Xu / +2M Vàng</div>
                </div>
            </div>
            <button id="btn-recharge" class="btn-submit" onclick="submitRecharge()" disabled>XÁC NHẬN NẠP TIỀN</button>
        </div>

        <div id="result-box"></div>
    </div>

    <script>
        const token = "{{.Token}}";
        const hasChar = {{.HasCharacter}};
        let selectedAmount = 0;

        if (!hasChar) {
            document.getElementById("btn-redeem").disabled = true;
            document.getElementById("btn-recharge").disabled = true;
            showResult("Bạn chưa tạo nhân vật trong game. Vui lòng vào game tạo nhân vật trước!", false);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            
            // clear result box
            const resBox = document.getElementById("result-box");
            resBox.style.display = "none";
        }

        function selectRecharge(element, amount) {
            if (!hasChar) return;
            document.querySelectorAll('.recharge-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
            selectedAmount = amount;
            document.getElementById("btn-recharge").disabled = false;
        }

        function showResult(message, isSuccess) {
            const resBox = document.getElementById("result-box");
            resBox.className = isSuccess ? "result-success" : "result-error";
            resBox.innerText = message;
            resBox.style.display = "block";
        }

        async function submitRedeem() {
            const input = document.getElementById("giftcode-input");
            const code = input.value.trim();
            if (!code) {
                showResult("Vui lòng nhập mã GiftCode!", false);
                return;
            }

            const btn = document.getElementById("btn-redeem");
            btn.disabled = true;

            try {
                const response = await fetch("/api/user/redeem?token=" + encodeURIComponent(token) + "&zone_id={{.ZoneID}}", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code: code })
                });
                const res = await response.json();
                if (res.code === 0) {
                    showResult(res.message, true);
                    input.value = "";
                    updateStats(res.gold, res.diamond);
                } else {
                    showResult(res.message || "Đổi mã thất bại", false);
                }
            } catch (err) {
                showResult("Lỗi kết nối tới máy chủ", false);
            } finally {
                btn.disabled = false;
            }
        }

        async function submitRecharge() {
            if (selectedAmount <= 0) return;

            const btn = document.getElementById("btn-recharge");
            btn.disabled = true;

            try {
                const response = await fetch("/api/user/recharge?token=" + encodeURIComponent(token) + "&zone_id={{.ZoneID}}", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ amount: selectedAmount })
                });
                const res = await response.json();
                if (res.code === 0) {
                    showResult(res.message, true);
                    updateStats(res.gold, res.diamond);
                } else {
                    showResult(res.message || "Nạp tiền thất bại", false);
                }
            } catch (err) {
                showResult("Lỗi kết nối tới máy chủ", false);
            } finally {
                btn.disabled = false;
            }
        }

        function updateStats(gold, diamond) {
            document.getElementById("player-gold").innerText = gold + " Vàng";
            document.getElementById("player-diamond").innerText = diamond + " Xu";
        }

        function changeZone(newZoneId) {
            const currentUrl = new URL(window.location.href);
            currentUrl.searchParams.set("zone_id", newZoneId);
            window.location.href = currentUrl.toString();
        }
    </script>
</body>
</html>
